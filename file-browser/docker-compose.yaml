services:
  file-browser:
    image: hurlenko/filebrowser:latest
    container_name: file-browser
    user: "${PUID}:${PGID}"
    environment:
      FB_BASEURL: /filebrowser
    ports:
      - '8081:8080'
    volumes:
      - torrent:/data/torrent
      - config:/config
    networks:
      - frontend
      - backend
    labels:
      traefik.enable: 'true'
      traefik.http.routers.file-browser.rule: 'Host(`filebrowser.in.rounds.house`)'
      traefik.http.routers.file-browser.entrypoints: 'https'
      traefik.http.routers.file-browser.tls: 'true'
      traefik.http.services.file-browser.loadbalancer.server.port: '8080'
      traefik.docker.network: 'frontend'

      wud.link.template: 'https://github.com/filebrowser/filebrowser/releases'
      wud.display.name: 'File Browser'
      wud.display.icon: 'sh:file-browser'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

volumes:
  config:
    name: file-browser_config
  torrent:
    name: nfs_torrent
    external: true

networks:
  frontend:
    external: true
  backend:
    external: true