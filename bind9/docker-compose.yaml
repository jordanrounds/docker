services:
  bind9-test:
    image: ubuntu/bind9:9.18-22.04_beta
    #image: ubuntu/bind9:9.18-22.04_edge
    container_name: bind9-test
    environment:
      BIND9_USER: bind
      TZ: "${TZ}"
    ports:
      - '53:53/tcp'  # Test port
      - '53:53/udp'  # Test port
    volumes:
      - ./config:/etc/bind
      - cache_test:/var/cache/bind
      - ./docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
    secrets:
      - rndc_key
    networks:
      - backend
    labels:
      wud.tag.include: '^\d+\.\d+-\d+\.\d+_(beta|candidate|stable)$$'
      wud.display.name: 'Bind9 Test'
      wud.display.icon: 'mdi:dns-outline'
    healthcheck:
      test: ["CMD-SHELL", "rndc status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    mem_reservation: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint-custom.sh"]

volumes:
  cache_test:
    name: bind9_cache_test

secrets:
  rndc_key:
    file: ${SECRETS}/bind9.rndc.key

networks:
  backend:
    external: true
