services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    environment:
      TZ: "${TZ}"
    ports:
      - '9000:9000'
      - '9443:9443'
      - '8000:8000'
    volumes:
      - data:/data
    networks:
      - frontend
      - socket-proxy
    command: -H tcp://socket-proxy:2375
    labels:
      traefik.enable: 'true'
      traefik.http.routers.portainer.rule: 'Host(`portainer.in.rounds.house`)'
      traefik.http.routers.portainer.entrypoints: 'https'
      traefik.http.routers.portainer.tls: 'true'
      traefik.http.services.portainer.loadbalancer.server.scheme: 'https'
      traefik.http.services.portainer.loadbalancer.server.port: '9443'
      traefik.docker.network: 'frontend'

      wud.tag.include: '^\d+\.\d+\.\d+-alpine$$'
      wud.link.template: 'https://github.com/portainer/portainer/releases/tag/$${major}.$${minor}.$${patch}'
      wud.display.name: 'Portainer'
      wud.display.icon: 'sh:portainer'
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: always

volumes:
  data:
    name: portainer_data

networks:
  frontend:
    external: true
  socket-proxy:
    external: true
