services:
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - config:/config
    ports:
      - 8181:8181
    networks:
      - frontend
    labels:
      traefik.enable: 'true'
      traefik.http.routers.tautulli.rule: 'Host(`tautulli.in.rounds.house`)'
      traefik.http.routers.tautulli.entrypoints: 'https'
      traefik.http.routers.tautulli.tls: 'true'
      traefik.http.services.tautulli.loadbalancer.server.port: '8181'
      traefik.docker.network: 'frontend'

      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/linuxserver/docker-tautulli/releases'
      wud.display.name: 'Tautulli'
      wud.display.icon: 'sh:tautulli'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8181/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped

volumes:
  config:
    name: tautulli_config

networks:
  frontend:
    external: true