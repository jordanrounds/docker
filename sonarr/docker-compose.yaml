services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    volumes:
      - config:/config
      - data:/data
      - torrent:/torrent
    ports:
      - 8989:8989
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 1024m
    mem_reservation: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped
    labels:
      traefik.enable: 'true'
      traefik.http.routers.sonarr.rule: 'Host(`sonarr.in.rounds.house`)'
      traefik.http.routers.sonarr.entrypoints: 'https'
      traefik.http.routers.sonarr.tls: 'true'
      traefik.http.services.sonarr.loadbalancer.server.port: '8989'
      traefik.docker.network: 'frontend'

      wud.link.template: 'https://github.com/linuxserver/docker-sonarr/releases'
      wud.display.name: 'Sonarr'
      wud.display.icon: 'sh:sonarr'

volumes:
  config:
    name: sonarr_config
  torrent:
    name: nfs_torrent
    external: true
  data:
    name: nfs_data
    external: true

networks:
  frontend:
    external: true