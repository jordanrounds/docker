services:
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    volumes:
      - config:/config
    ports:
      - 5055:5055
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped
    labels:
      traefik.enable: 'true'
      traefik.http.routers.overseerr.rule: 'Host(`overseerr.in.rounds.house`)'
      traefik.http.routers.overseerr.entrypoints: 'https'
      traefik.http.routers.overseerr.tls: 'true'
      traefik.http.services.overseerr.loadbalancer.server.port: '5055'
      traefik.docker.network: 'frontend'

      wud.link.template: 'https://github.com/linuxserver/docker-overseerr/releases'
      wud.display.name: 'overseerr'
      wud.display.icon: 'sh:overseerr'

volumes:
  config:
    name: overseerr_config

networks:
  frontend:
    external: true
