api:
  dashboard: true
  debug: false

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  https:
    address: ":443"

serversTransport:
  insecureSkipVerify: true # let proxmox work

log:
  level: INFO

providers:
  docker:
    endpoint: "tcp://socket-proxy:2375"
    exposedByDefault: false
  file:
    directory: /config
    watch: false  # fixes known memory leak

certificatesResolvers:
  dnsimple:
    acme:
      email: jrounds@mac.com
      storage: /letsencrypt/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: dnsimple
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"
