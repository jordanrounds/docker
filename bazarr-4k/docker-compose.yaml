services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-4k
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    volumes:
      - config:/config
      - data:/data
    ports:
      - 6768:6767
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6767/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped
    labels:
      traefik.enable: 'true'
      traefik.http.routers.bazarr-4k.rule: 'Host(`bazarr-4k.in.rounds.house`)'
      traefik.http.routers.bazarr-4k.entrypoints: 'https'
      traefik.http.routers.bazarr-4k.tls: 'true'
      traefik.http.services.bazarr-4k.loadbalancer.server.port: '6767'
      traefik.docker.network: 'frontend'

      wud.link.template: 'https://github.com/linuxserver/docker-bazarr/releases'
      wud.display.name: 'bazarr'
      wud.display.icon: 'sh:bazarr'

volumes:
  config:
    name: bazarr-4k_config
  media:
    name: nfs_media
    external: true
  data:
    name: nfs_data
    external: true
networks:
  frontend:
    external: true