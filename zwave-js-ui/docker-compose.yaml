services:
  zwave-js-ui:
    image: zwavejs/zwave-js-ui:latest
    container_name: zwave-js-ui
    environment:
      SESSION_SECRET: "${SESSION_SECRET}"
      ZWAVEJS_EXTERNAL_CONFIG: /usr/src/app/store/.config-db
      TZ: "${TZ}"
    networks:
      - backend
      - frontend
    devices:
      # Use the /dev/serial/by-id/X serial device for Z-Wave stick.
      - '/dev/serial/by-id/usb-Zooz_800_Z-Wave_Stick_533D004242-if00:/dev/zwave'
    volumes:
      - config:/usr/src/app/store
    ports:
      - '8091:8091' # port for web interface
      - '3000:3000' # port for Z-Wave JS websocket server
    labels:
      traefik.enable: 'true'
      traefik.http.routers.zwave-js-ui.rule: 'Host(`zwave.in.rounds.house`)'
      traefik.http.routers.zwave-js-ui.entrypoints: 'https'
      traefik.http.routers.zwave-js-ui.tls: 'true'
      traefik.http.services.zwave-js-ui.loadbalancer.server.port: '8091'
      traefik.docker.network: 'frontend'

      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/zwave-js/zwave-js-ui/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: 'ZWave JS UI'
      wud.display.icon: 'sh:z-wave-js-ui'
    restart: unless-stopped
    tty: true
    stop_signal: SIGINT
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

volumes:
  config:
    name: zwave-js-ui_config

networks:
  backend:
    external: true
  frontend:
    external: true
