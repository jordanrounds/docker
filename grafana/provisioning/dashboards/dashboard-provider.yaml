apiVersion: 1

providers:
  - name: 'Docker Monitoring'
    orgId: 1
    folder: 'Docker Monitoring'
    folderUid: 'docker-monitoring-folder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
