# Telegraf configuration for Docker home server metrics
# Collects Docker container and host system metrics

[global_tags]
  host = "docker-server"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# Output to InfluxDB v2
[[outputs.influxdb_v2]]
  urls = ["http://influxdb2:8086"]
  token = "$INFLUX_TOKEN"
  organization = "rounds.house"
  bucket = "docker"
  timeout = "5s"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# Docker container metrics
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  source_tag = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice = true
  perdevice_include = ["cpu", "blkio", "network"]
  total = true
  total_include = ["cpu", "blkio", "network"]
  docker_label_include = []
  docker_label_exclude = []

# Host CPU metrics
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false

# Host memory metrics
[[inputs.mem]]

# Host disk usage metrics
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Host disk I/O metrics
[[inputs.diskio]]

# Host network metrics
[[inputs.net]]
  ignore_protocol_stats = false

# System load and uptime
[[inputs.system]]

# Process statistics
[[inputs.processes]]

# Kernel statistics
[[inputs.kernel]]
