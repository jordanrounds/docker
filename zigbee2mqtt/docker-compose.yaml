services:
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:2.6.3
    container_name: zigbee2mqtt
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    user: ${PUID}:${PGID}
    volumes:
      - data:/app/data
    ports:
      - 8383:8080
    networks:
      - frontend
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zigbee2mqtt.rule=Host(`zigbee.in.rounds.house`)"
      - "traefik.http.routers.zigbee2mqtt.entrypoints=https"
      - "traefik.http.routers.zigbee2mqtt.tls=true"
      - "traefik.http.services.zigbee2mqtt.loadbalancer.server.port=8080"
      - "traefik.docker.network=frontend"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

volumes:
  data:
    name: zigbee2mqtt_data
    external: true

networks:
  frontend:
    external: true
  backend:
    external: true