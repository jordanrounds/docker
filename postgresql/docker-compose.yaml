services:
  postgresql:
    image: postgres:16.4
    container_name: postgresql
    shm_size: 1gb # Increase shared memory size
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD_FILE: /run/secrets/password
      PGDATA: /var/lib/postgresql/data/pgdata  # Directory for database data
    volumes:
      - data:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf  # config
      - ./config/pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf # client authentication config
    secrets:
      - password
    ports:
      - '5432:5432'
    networks:
      - backend
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    labels:
      wud.tag.include: '^\d+\.\d+$$'
      wud.link.template: 'https://www.postgresql.org/docs/release/$${major}.$${minor}'
      wud.display.name: 'PostgreSQL'
      wud.display.icon: 'sh:postgresql'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped

volumes:
  data:
    name: postgresql_data

secrets:
  password:
    file: ${SECRETS}/postgress.password.ha

networks:
  backend:
    external: true