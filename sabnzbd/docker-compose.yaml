services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    volumes:
      - config:/config
      - data:/data/usenet
      #- /path/to/downloads:/downloads #optional
      #- /path/to/incomplete/downloads:/incomplete-downloads #optional
    ports:
      - 8082:8080
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api?mode=version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped
    labels:
      traefik.enable: 'true'
      traefik.http.routers.sabnzbd.rule: 'Host(`sabnzbd.in.rounds.house`)'
      traefik.http.routers.sabnzbd.entrypoints: 'https'
      traefik.http.routers.sabnzbd.tls: 'true'
      traefik.http.services.sabnzbd.loadbalancer.server.port: '8080'
      traefik.docker.network: 'frontend'

      wud.link.template: 'https://github.com/linuxserver/docker-sabnzbd/releases'
      wud.display.name: 'sabnzbd'
      wud.display.icon: 'sh:sabnzbd'

volumes:
  config:
    name: sabnzbd_config
  data:
    name: nfs_data_usenet
    external: true
  # media:
  #   name: nfs_media
  #   external: true
  # test:
  #   name: nfs_test
  #   external: true

networks:
  frontend:
    external: true