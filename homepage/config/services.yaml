- Docker:
    - Portainer:
        href: https://portainer.in.rounds.house
        icon: portainer
        widget:
            type: portainer
            url: https://portainer.in.rounds.house:9443
            env: 1
            key: {{HOMEPAGE_FILE_PORTAINER_KEY}}
    - Code Server:
        href: http://code.in.rounds.house
        icon: vscode
        description: Edit Docker volume contents
    - Whats Up Docker?:
        href: http://wud.in.rounds.house
        icon: sh-whats-up-docker
        widget:
