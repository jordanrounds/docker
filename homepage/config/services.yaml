---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/services

- Media:
    - Plex:
        href: https://plex.in.rounds.house
        icon: plex
        widget:
            type: plex
            url: https://plex.in.rounds.house
            key: {{HOMEPAGE_FILE_PLEX_KEY}} # see https://www.plexopedia.com/plex-media-server/general/plex-token/
    - QBitTorrent:
        href: https://torrent.in.rounds.house
        icon: qbittorrent
        widget:
            type: qbittorrent
            url: https://torrent.in.rounds.house
            username: {{HOMEPAGE_FILE_QBITTORRENT_USERNAME}}
            password: {{HOMEPAGE_FILE_QBITTORRENT_PASSWORD}}
    - Prowlarr:
        href: https://prowlarr.in.rounds.house
        icon: prowlarr
        widget:
            type: prowlarr
            url: https://prowlarr.in.rounds.house
            key: {{HOMEPAGE_FILE_PROWLARR_KEY}}
    - Radarr:
        href: https://radarr.in.rounds.house
        icon: sh-radarr-light
        widget:
            type: radarr
            url: https://radarr.in.rounds.house
            key: {{HOMEPAGE_FILE_RADARR_KEY}}
            enableQueue: true # optional, defaults to false
    - Radarr 4K:
        href: https://radarr-4k.in.rounds.house
        icon: sh-radarr-light
