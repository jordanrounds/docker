services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
      PGADMIN_DEFAULT_EMAIL_FILE: /run/secrets/pgadmin_email
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    volumes:
      - data:/var/lib/pgadmin
    ports:
      - '8084:80'
    secrets:
      - pgadmin_email
      - pgadmin_password
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - backend
    labels:
      traefik.enable: 'true'
      traefik.http.routers.pgadmin.rule: 'Host(`pgadmin.in.rounds.house`)'
      traefik.http.routers.pgadmin.entrypoints: 'https'
      traefik.http.routers.pgadmin.tls: 'true'
      traefik.http.services.pgadmin.loadbalancer.server.port: '80'
      traefik.docker.network: 'frontend'

      wud.link.template: 'https://www.postgresql.org/docs/release/$${major}.$${minor}'
      wud.display.name: 'PGAdmin'
      wud.display.icon: 'sh:pgadmin'
    restart: unless-stopped

volumes:
  data:
    name: pgadmin_data

networks:
  backend:
    external: true
  frontend:
    external: true

secrets:
  pgadmin_email:
    file: ${SECRETS}/pgadmin.email
  pgadmin_password:
    file: ${SECRETS}/pgadmin.password