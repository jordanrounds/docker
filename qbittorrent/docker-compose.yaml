services:
  qbittorrent:
    #image: lscr.io/linuxserver/qbittorrent:latest
    image: linuxserver/qbittorrent:5.0.0
    container_name: qbittorrent
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
      WEBUI_PORT: '8080'
      TORRENTING_PORT: '6881'
      DOCKER_MODS: 'ghcr.io/themepark-dev/theme.park:qbittorrent'
      QBITTORRENT_VERSION: '5.0.0'
      TP_COMMUNITY_THEME: 'true'
      TP_THEME: catppuccin-mocha
      TP_DISABLE_THEME: 'false' # set to true to disable theme if web ui wont load
    volumes:
      - config:/config
      - torrent:/torrent
    networks:
      - frontend
    ports:
      - '8080:8080'
      - '6881:6881'
      - '6881:6881/udp'
    labels:
      traefik.enable: 'true'
      traefik.http.routers.qbittorrent.rule: 'Host(`torrent.in.rounds.house`)'
      traefik.http.routers.qbittorrent.entrypoints: 'https'
      traefik.http.routers.qbittorrent.tls: 'true'
      traefik.http.services.qbittorrent.loadbalancer.server.port: '8080'
      traefik.docker.network: 'frontend'

      wud.tag.include: '^\d\.\d+\.\d+$$' # single digit major version, otherwise finds weird version 20 tags
      wud.link.template: 'https://www.qbittorrent.org/news'
      wud.display.name: 'qBittorrent'
      wud.display.icon: 'sh:qbittorrent'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 -o /dev/null -w '%{http_code}' | grep -q '200\\|302\\|403'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped

volumes:
  config:
    name: qbittorrent_config
  torrent:
    name: nfs_torrent
    external: true

networks:
  frontend:
    external: true