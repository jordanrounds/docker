services:
  nzbhydra:
    image: lscr.io/linuxserver/nzbhydra2:latest
    container_name: nzbhydra
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    volumes:
      - config:/config
      #- /path/to/downloads:/downloads #optional
    ports:
      - 5076:5076
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5076 -o /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    mem_reservation: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    restart: unless-stopped
    labels:
      traefik.enable: 'true'
      traefik.http.routers.nzbhydra.rule: 'Host(`nzbhydra.in.rounds.house`)'
      traefik.http.routers.nzbhydra.entrypoints: 'https'
      traefik.http.routers.nzbhydra.tls: 'true'
      traefik.http.services.nzbhydra.loadbalancer.server.port: '5076'
      traefik.docker.network: 'frontend'

      wud.link.template: 'https://github.com/linuxserver/docker-nzbhydra2/releases'
      wud.display.name: 'nzbhydra'
      wud.display.icon: 'sh:nzbhydra'

volumes:
  config:
    name: nzbhydra_config

networks:
  frontend:
    external: true